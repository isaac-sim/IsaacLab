name: 'Build Docker Image'
description: 'Builds a Docker image with IsaacSim and IsaacLab dependencies'

inputs:
  image-tag:
    description: 'Docker image tag to use'
    required: true
  isaacsim-base-image:
    description: 'IsaacSim base image'
    required: true
  isaacsim-version:
    description: 'IsaacSim version'
    required: true
  dockerfile-path:
    description: 'Path to Dockerfile'
    default: 'docker/Dockerfile.base'
    required: false
  context-path:
    description: 'Build context path'
    default: '.'
    required: false
  push:
    description: 'Push the built image to the registry instead of loading it locally'
    default: 'false'
    required: false
  ecr-cache-tags:
    description: 'Space-separated ECR image refs to use as registry layer-cache sources (--cache-from type=registry,ref=...). Falls back to GitHub Actions cache when empty.'
    default: ''
    required: false
  ecr-write-cache-tag:
    description: 'ECR image ref to write the build cache to (--cache-to type=registry,ref=...,mode=max). Falls back to GitHub Actions cache when empty.'
    default: ''
    required: false

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: NGC Login
      shell: sh
      run: |
        # Only attempt NGC login if API key is available
        if [ -n "${{ env.NGC_API_KEY }}" ]; then
          echo "Logging into NGC registry..."
          docker login -u \$oauthtoken -p ${{ env.NGC_API_KEY }} nvcr.io
          echo "✅ Successfully logged into NGC registry"
        else
          echo "⚠️ NGC_API_KEY not available - skipping NGC login"
          echo "This is normal for PRs from forks or when secrets are not configured"
        fi

    - name: Build Docker Image
      shell: sh
      run: |
        IMAGE_TAG="${{ inputs.image-tag }}"
        PUSH="${{ inputs.push }}"
        ECR_CACHE_TAGS="${{ inputs.ecr-cache-tags }}"
        ECR_WRITE_CACHE_TAG="${{ inputs.ecr-write-cache-tag }}"

        echo "Building Docker image: $IMAGE_TAG"
        echo "Using Dockerfile: ${{ inputs.dockerfile-path }}"
        echo "Build context: ${{ inputs.context-path }}"

        # Assemble --cache-from flags: prefer ECR registry cache, fall back to GHA cache
        if [ -n "$ECR_CACHE_TAGS" ]; then
          CACHE_FROM_ARGS=""
          for tag in $ECR_CACHE_TAGS; do
            CACHE_FROM_ARGS="$CACHE_FROM_ARGS --cache-from type=registry,ref=$tag"
          done
        else
          CACHE_FROM_ARGS="--cache-from type=gha"
        fi

        # Assemble --cache-to flag: prefer ECR registry cache, fall back to GHA cache
        if [ -n "$ECR_WRITE_CACHE_TAG" ]; then
          CACHE_TO_ARG="--cache-to type=registry,ref=$ECR_WRITE_CACHE_TAG,mode=max"
        else
          CACHE_TO_ARG="--cache-to type=gha,mode=max"
        fi

        # Assemble output mode: push to registry or load into local daemon
        if [ "$PUSH" = "true" ]; then
          OUTPUT_ARG="--push"
          TAG_ARGS="-t $IMAGE_TAG"
        else
          OUTPUT_ARG="--load"
          TAG_ARGS="-t isaac-lab-dev -t $IMAGE_TAG"
        fi

        # shellcheck disable=SC2086
        docker buildx build --progress=plain --platform linux/amd64 \
          $TAG_ARGS \
          --build-arg ISAACSIM_BASE_IMAGE_ARG="${{ inputs.isaacsim-base-image }}" \
          --build-arg ISAACSIM_VERSION_ARG="${{ inputs.isaacsim-version }}" \
          --build-arg ISAACSIM_ROOT_PATH_ARG=/isaac-sim \
          --build-arg ISAACLAB_PATH_ARG=/workspace/isaaclab \
          --build-arg DOCKER_USER_HOME_ARG=/root \
          $CACHE_FROM_ARGS \
          $CACHE_TO_ARG \
          -f "${{ inputs.dockerfile-path }}" \
          $OUTPUT_ARG "${{ inputs.context-path }}"

        echo "✅ Docker image built successfully: $IMAGE_TAG"
        if [ "$PUSH" != "true" ]; then
          docker images | grep "isaac-lab-dev" || true
        fi
