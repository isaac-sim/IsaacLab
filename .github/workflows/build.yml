name: Build and Test

on:
  pull_request:
    branches:
      - develop
      - main
      - 'release/**'
      - feature/isaacsim-6-0

# Concurrency control to prevent parallel runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: read

env:
  NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
  ISAACSIM_BASE_IMAGE: nvcr.io/nvidian/isaac-sim #${{ vars.ISAACSIM_BASE_IMAGE || 'nvcr.io/nvidia/isaac-sim' }}
  ISAACSIM_BASE_VERSION: 'latest-develop' #${{ vars.ISAACSIM_BASE_VERSION || '5.1.0' }}
  DOCKER_IMAGE_TAG: isaac-lab-dev:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}-${{ github.sha }}

jobs:
  test-isaaclab-tasks:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180
    continue-on-error: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Build Docker Image
      uses: ./.github/actions/docker-build
      with:
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}

    # DEBUG: Running only test_environments.py and test_cartpole_showcase_environments.py to isolate freeze
    - name: Run IsaacLab Tasks Tests (debug - 2 files only)
      run: |
        CONTAINER_NAME="isaac-lab-tasks-test-$$"
        docker rm -f $CONTAINER_NAME 2>/dev/null || true
        mkdir -p reports

        docker run --name $CONTAINER_NAME \
          --entrypoint bash --gpus all --network=host \
          --security-opt=no-new-privileges:true \
          --memory=$(echo "$(free -m | awk '/^Mem:/{print $2}') * 0.9 / 1" | bc)m \
          --cpus=$(echo "$(nproc) * 0.9" | bc) \
          --oom-kill-disable=false \
          --ulimit nofile=65536:65536 \
          --ulimit nproc=4096:4096 \
          -e OMNI_KIT_ACCEPT_EULA=yes \
          -e ACCEPT_EULA=Y \
          -e OMNI_KIT_DISABLE_CUP=1 \
          -e ISAAC_SIM_HEADLESS=1 \
          -e ISAAC_SIM_LOW_MEMORY=1 \
          -e PYTHONUNBUFFERED=1 \
          -e PYTHONIOENCODING=utf-8 \
          ${{ env.DOCKER_IMAGE_TAG }} \
          -c "
            set -e
            cd /workspace/isaaclab
            mkdir -p tests

            echo '========================================='
            echo 'Running test_environments.py'
            echo '========================================='
            /isaac-sim/python.sh -m pytest \
              source/isaaclab_tasks/test/test_environments.py \
              -v --tb=short --no-header \
              --junitxml=tests/test-report-environments.xml \
              || echo 'test_environments.py exited with code: \$?'

            echo '========================================='
            echo 'Running test_cartpole_showcase_environments.py'
            echo '========================================='
            /isaac-sim/python.sh -m pytest \
              source/isaaclab_tasks/test/test_cartpole_showcase_environments.py \
              -v --tb=short --no-header \
              --junitxml=tests/test-report-cartpole.xml \
              || echo 'test_cartpole_showcase_environments.py exited with code: \$?'
          " || echo 'Docker container exited with errors, continuing to copy results...'

        # Copy whichever result files exist
        for f in test-report-environments.xml test-report-cartpole.xml; do
          docker cp $CONTAINER_NAME:/workspace/isaaclab/tests/$f reports/ 2>/dev/null || echo "Could not copy $f"
        done

        # Merge into a single report for downstream steps
        if [ -f reports/test-report-environments.xml ]; then
          cp reports/test-report-environments.xml reports/isaaclab-tasks-report.xml
        elif [ -f reports/test-report-cartpole.xml ]; then
          cp reports/test-report-cartpole.xml reports/isaaclab-tasks-report.xml
        else
          echo '<?xml version="1.0" encoding="utf-8"?><testsuite name="no-results" tests="0" failures="0" errors="1"><testcase classname="setup" name="no_results"><error message="No results found"/></testcase></testsuite>' > reports/isaaclab-tasks-report.xml
        fi

        docker rm $CONTAINER_NAME 2>/dev/null || true

    - name: Upload IsaacLab Tasks Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: isaaclab-tasks-test-results
        path: reports/isaaclab-tasks-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/isaaclab-tasks-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/isaaclab-tasks-report.xml || grep -q 'errors="[1-9]' reports/isaaclab-tasks-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

  test-general:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Build Docker Image
      uses: ./.github/actions/docker-build
      with:
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}

    - name: Run General Tests
      id: run-general-tests
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "general-tests-report.xml"
        container-name: "isaac-lab-general-test-$$"
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        pytest-options: ""
        filter-pattern: "not isaaclab_tasks"

    - name: Copy Test Results from General Tests Container
      run: |
        CONTAINER_NAME="isaac-lab-general-test-$$"
        if docker ps -a | grep -q $CONTAINER_NAME; then
          echo "Copying test results from General Tests container..."
          docker cp $CONTAINER_NAME:/workspace/isaaclab/tests/general-tests-report.xml reports/ 2>/dev/null || echo "No test results to copy from General Tests container"
        fi

    - name: Upload General Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: general-test-results
        path: reports/general-tests-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/general-tests-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/general-tests-report.xml || grep -q 'errors="[1-9]' reports/general-tests-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

  test-curobo:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 120
    continue-on-error: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Build Docker Image (cuRobo)
      uses: ./.github/actions/docker-build
      with:
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}-curobo
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        dockerfile-path: 'docker/Dockerfile.curobo'

    - name: Run cuRobo and SkillGen Tests
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "curobo-tests-report.xml"
        container-name: "isaac-lab-curobo-test-$$"
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}-curobo
        pytest-options: ""
        filter-pattern: ""
        curobo-only: "true"

    - name: Copy Test Results from cuRobo Container
      run: |
        CONTAINER_NAME="isaac-lab-curobo-test-$$"
        if docker ps -a | grep -q $CONTAINER_NAME; then
          echo "Copying test results from cuRobo container..."
          docker cp $CONTAINER_NAME:/workspace/isaaclab/tests/curobo-tests-report.xml reports/ 2>/dev/null || echo "No test results to copy from cuRobo container"
        fi

    - name: Upload cuRobo Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: curobo-test-results
        path: reports/curobo-tests-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/curobo-tests-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/curobo-tests-report.xml || grep -q 'errors="[1-9]' reports/curobo-tests-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

  combine-results:
    needs: [test-isaaclab-tasks, test-general, test-curobo]
    runs-on: [self-hosted, gpu]
    if: always()

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: false

    - name: Create Reports Directory
      run: |
        mkdir -p reports

    - name: Download Test Results
      uses: actions/download-artifact@v4
      with:
        name: isaaclab-tasks-test-results
        path: reports/
      continue-on-error: true

    - name: Download General Test Results
      uses: actions/download-artifact@v4
      with:
        name: general-test-results
        path: reports/

    - name: Download cuRobo Test Results
      uses: actions/download-artifact@v4
      with:
        name: curobo-test-results
        path: reports/
      continue-on-error: true

    - name: Combine All Test Results
      uses: ./.github/actions/combine-results
      with:
        tests-dir: "reports"
        output-file: "reports/combined-results.xml"

    - name: Upload Combined Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pr-${{ github.event.pull_request.number }}-combined-test-results
        path: reports/combined-results.xml
        retention-days: 7
        compression-level: 9

    - name: Comment on Test Results
      id: test-reporter
      if: github.event.pull_request.head.repo.full_name == github.repository
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: "reports/combined-results.xml"
        check_name: "Tests Summary"
        comment_mode: changes
        comment_title: "Test Results Summary"
        report_individual_runs: false
        deduplicate_classes_by_file_name: true
        compare_to_earlier_commit: true
        fail_on: errors
        action_fail_on_inconclusive: true

    - name: Report Test Results
      if: github.event.pull_request.head.repo.full_name == github.repository
      uses: dorny/test-reporter@v1
      with:
        name: IsaacLab Build and Test Results
        path: reports/combined-results.xml
        reporter: java-junit
        fail-on-error: true
        only-summary: false
        max-annotations: '50'
        report-title: "IsaacLab Test Results - ${{ github.workflow }}"
