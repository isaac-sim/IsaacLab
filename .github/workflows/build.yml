name: Build and Test

on:
  pull_request:
    branches:
      - develop
      - main
      - 'release/**'
      - feature/isaacsim-6-0

# Concurrency control to prevent parallel runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: read

env:
  NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
  ISAACSIM_BASE_IMAGE: nvcr.io/nvidian/isaac-sim #${{ vars.ISAACSIM_BASE_IMAGE || 'nvcr.io/nvidia/isaac-sim' }}
  ISAACSIM_BASE_VERSION: 'latest-develop' #${{ vars.ISAACSIM_BASE_VERSION || '5.1.0' }}
  ECR_CACHE_URL: 968945269301.dkr.ecr.us-west-2.amazonaws.com/gitci-docker-cache

jobs:
  # ── Build Phase ──────────────────────────────────────────────────────────────
  # Each Dockerfile is built once per pipeline and pushed to ECR with the commit
  # SHA as the image tag. All test jobs pull from ECR rather than rebuilding,
  # eliminating redundant multi-gigabyte builds. Layer caching is stored in ECR
  # with per-branch keys so that feature branches inherit the develop cache on
  # first run and build incrementally on subsequent runs.

  build-base-image:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 60
    outputs:
      ecr-image-tag: ${{ steps.tags.outputs.ecr_image_tag }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-west-2 \
          | docker login --username AWS --password-stdin ${{ env.ECR_CACHE_URL }}

    - name: Compute ECR image and cache tags
      id: tags
      run: |
        BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
        SHA="${{ github.sha }}"
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          ECR_IMAGE_TAG="${ECR_CACHE_URL}:pr-${{ github.event.pull_request.number }}-${SHA}"
        else
          ECR_IMAGE_TAG="${ECR_CACHE_URL}:${BRANCH}-${SHA}"
        fi
        echo "ecr_image_tag=${ECR_IMAGE_TAG}" >> $GITHUB_OUTPUT
        echo "ecr_cache_tag=${ECR_CACHE_URL}:cache-base-${BRANCH}" >> $GITHUB_OUTPUT
        echo "ecr_cache_fallback=${ECR_CACHE_URL}:cache-base-develop" >> $GITHUB_OUTPUT

    - name: Build and Push Base Docker Image
      uses: ./.github/actions/docker-build
      with:
        image-tag: ${{ steps.tags.outputs.ecr_image_tag }}
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        push: 'true'
        ecr-cache-tags: "${{ steps.tags.outputs.ecr_cache_tag }} ${{ steps.tags.outputs.ecr_cache_fallback }}"
        ecr-write-cache-tag: ${{ steps.tags.outputs.ecr_cache_tag }}

  build-curobo-image:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 90
    outputs:
      ecr-image-tag: ${{ steps.tags.outputs.ecr_image_tag }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-west-2 \
          | docker login --username AWS --password-stdin ${{ env.ECR_CACHE_URL }}

    - name: Compute ECR image and cache tags
      id: tags
      run: |
        BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
        SHA="${{ github.sha }}"
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          ECR_IMAGE_TAG="${ECR_CACHE_URL}:pr-${{ github.event.pull_request.number }}-${SHA}-curobo"
        else
          ECR_IMAGE_TAG="${ECR_CACHE_URL}:${BRANCH}-${SHA}-curobo"
        fi
        echo "ecr_image_tag=${ECR_IMAGE_TAG}" >> $GITHUB_OUTPUT
        echo "ecr_cache_tag=${ECR_CACHE_URL}:cache-curobo-${BRANCH}" >> $GITHUB_OUTPUT
        echo "ecr_cache_fallback=${ECR_CACHE_URL}:cache-curobo-develop" >> $GITHUB_OUTPUT

    - name: Build and Push cuRobo Docker Image
      uses: ./.github/actions/docker-build
      with:
        image-tag: ${{ steps.tags.outputs.ecr_image_tag }}
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        dockerfile-path: 'docker/Dockerfile.curobo'
        push: 'true'
        ecr-cache-tags: "${{ steps.tags.outputs.ecr_cache_tag }} ${{ steps.tags.outputs.ecr_cache_fallback }}"
        ecr-write-cache-tag: ${{ steps.tags.outputs.ecr_cache_tag }}

  # ── Test Phase ───────────────────────────────────────────────────────────────

  test-isaaclab-tasks:
    needs: [build-base-image]
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180
    continue-on-error: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-west-2 \
          | docker login --username AWS --password-stdin ${{ env.ECR_CACHE_URL }}

    - name: Pull Base Docker Image from ECR
      run: docker pull ${{ needs.build-base-image.outputs.ecr-image-tag }}

    - name: Run IsaacLab Tasks Tests
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "isaaclab-tasks-report.xml"
        container-name: "isaac-lab-tasks-test-$$"
        image-tag: ${{ needs.build-base-image.outputs.ecr-image-tag }}
        pytest-options: ""
        filter-pattern: "isaaclab_tasks"
        include-files: "test_multi_agent_environments.py,test_pickplace_stack_environments.py,test_environments.py,test_factory_environments.py,test_environments_training.py,test_cartpole_showcase_environments.py,test_teleop_environments.py"

    - name: Copy Test Results from IsaacLab Tasks Container
      run: |
        CONTAINER_NAME="isaac-lab-tasks-test-$$"
        if docker ps -a | grep -q $CONTAINER_NAME; then
          echo "Copying test results from IsaacLab Tasks container..."
          docker cp $CONTAINER_NAME:/workspace/isaaclab/tests/isaaclab-tasks-report.xml reports/ 2>/dev/null || echo "No test results to copy from IsaacLab Tasks container"
        fi

    - name: Upload IsaacLab Tasks Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: isaaclab-tasks-test-results
        path: reports/isaaclab-tasks-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/isaaclab-tasks-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/isaaclab-tasks-report.xml || grep -q 'errors="[1-9]' reports/isaaclab-tasks-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

  test-isaaclab-tasks-2:
    needs: [build-base-image]
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180
    continue-on-error: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-west-2 \
          | docker login --username AWS --password-stdin ${{ env.ECR_CACHE_URL }}

    - name: Pull Base Docker Image from ECR
      run: docker pull ${{ needs.build-base-image.outputs.ecr-image-tag }}

    - name: Run IsaacLab Tasks Tests 2
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "isaaclab-tasks-2-report.xml"
        container-name: "isaac-lab-tasks-2-test-$$"
        image-tag: ${{ needs.build-base-image.outputs.ecr-image-tag }}
        pytest-options: ""
        filter-pattern: "isaaclab_tasks"
        include-files: "test_teleop_environments_with_stage_in_memory.py,test_lift_teddy_bear.py,test_environment_determinism.py,test_hydra.py,test_env_cfg_no_forbidden_imports.py,test_rl_device_separation.py,test_cartpole_showcase_environments_with_stage_in_memory.py,test_environments_with_stage_in_memory.py"

    - name: Copy Test Results from IsaacLab Tasks 2 Container
      run: |
        CONTAINER_NAME="isaac-lab-tasks-2-test-$$"
        if docker ps -a | grep -q $CONTAINER_NAME; then
          echo "Copying test results from IsaacLab Tasks 2 container..."
          docker cp $CONTAINER_NAME:/workspace/isaaclab/tests/isaaclab-tasks-2-report.xml reports/ 2>/dev/null || echo "No test results to copy from IsaacLab Tasks 2 container"
        fi

    - name: Upload IsaacLab Tasks 2 Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: isaaclab-tasks-2-test-results
        path: reports/isaaclab-tasks-2-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/isaaclab-tasks-2-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/isaaclab-tasks-2-report.xml || grep -q 'errors="[1-9]' reports/isaaclab-tasks-2-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

  test-general:
    needs: [build-base-image]
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-west-2 \
          | docker login --username AWS --password-stdin ${{ env.ECR_CACHE_URL }}

    - name: Pull Base Docker Image from ECR
      run: docker pull ${{ needs.build-base-image.outputs.ecr-image-tag }}

    - name: Run General Tests
      id: run-general-tests
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "general-tests-report.xml"
        container-name: "isaac-lab-general-test-$$"
        image-tag: ${{ needs.build-base-image.outputs.ecr-image-tag }}
        pytest-options: ""
        filter-pattern: "not isaaclab_tasks"

    - name: Copy Test Results from General Tests Container
      run: |
        CONTAINER_NAME="isaac-lab-general-test-$$"
        if docker ps -a | grep -q $CONTAINER_NAME; then
          echo "Copying test results from General Tests container..."
          docker cp $CONTAINER_NAME:/workspace/isaaclab/tests/general-tests-report.xml reports/ 2>/dev/null || echo "No test results to copy from General Tests container"
        fi

    - name: Upload General Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: general-test-results
        path: reports/general-tests-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/general-tests-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/general-tests-report.xml || grep -q 'errors="[1-9]' reports/general-tests-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

  test-curobo:
    needs: [build-curobo-image]
    runs-on: [self-hosted, gpu]
    timeout-minutes: 120
    continue-on-error: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-west-2 \
          | docker login --username AWS --password-stdin ${{ env.ECR_CACHE_URL }}

    - name: Pull cuRobo Docker Image from ECR
      run: docker pull ${{ needs.build-curobo-image.outputs.ecr-image-tag }}

    - name: Run cuRobo and SkillGen Tests
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "curobo-tests-report.xml"
        container-name: "isaac-lab-curobo-test-$$"
        image-tag: ${{ needs.build-curobo-image.outputs.ecr-image-tag }}
        pytest-options: ""
        filter-pattern: ""
        curobo-only: "true"

    - name: Copy Test Results from cuRobo Container
      run: |
        CONTAINER_NAME="isaac-lab-curobo-test-$$"
        if docker ps -a | grep -q $CONTAINER_NAME; then
          echo "Copying test results from cuRobo container..."
          docker cp $CONTAINER_NAME:/workspace/isaaclab/tests/curobo-tests-report.xml reports/ 2>/dev/null || echo "No test results to copy from cuRobo container"
        fi

    - name: Upload cuRobo Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: curobo-test-results
        path: reports/curobo-tests-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/curobo-tests-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/curobo-tests-report.xml || grep -q 'errors="[1-9]' reports/curobo-tests-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

  combine-results:
    needs: [test-isaaclab-tasks, test-isaaclab-tasks-2, test-general, test-curobo]
    runs-on: [self-hosted]
    if: always()

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: false

    - name: Create Reports Directory
      run: |
        mkdir -p reports

    - name: Download Test Results
      uses: actions/download-artifact@v4
      with:
        name: isaaclab-tasks-test-results
        path: reports/
      continue-on-error: true

    - name: Download IsaacLab Tasks 2 Test Results
      uses: actions/download-artifact@v4
      with:
        name: isaaclab-tasks-2-test-results
        path: reports/
      continue-on-error: true

    - name: Download General Test Results
      uses: actions/download-artifact@v4
      with:
        name: general-test-results
        path: reports/

    - name: Download cuRobo Test Results
      uses: actions/download-artifact@v4
      with:
        name: curobo-test-results
        path: reports/
      continue-on-error: true

    - name: Combine All Test Results
      uses: ./.github/actions/combine-results
      with:
        tests-dir: "reports"
        output-file: "reports/combined-results.xml"

    - name: Upload Combined Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pr-${{ github.event.pull_request.number }}-combined-test-results
        path: reports/combined-results.xml
        retention-days: 7
        compression-level: 9

    - name: Comment on Test Results
      id: test-reporter
      if: github.event.pull_request.head.repo.full_name == github.repository
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: "reports/combined-results.xml"
        check_name: "Tests Summary"
        comment_mode: changes
        comment_title: "Test Results Summary"
        report_individual_runs: false
        deduplicate_classes_by_file_name: true
        compare_to_earlier_commit: true
        fail_on: errors
        action_fail_on_inconclusive: true

    - name: Report Test Results
      if: github.event.pull_request.head.repo.full_name == github.repository
      uses: dorny/test-reporter@v1
      with:
        name: IsaacLab Build and Test Results
        path: reports/combined-results.xml
        reporter: java-junit
        fail-on-error: true
        only-summary: false
        max-annotations: '50'
        report-title: "IsaacLab Test Results - ${{ github.workflow }}"
