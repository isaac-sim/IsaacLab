name: Debug ECR

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: isaaclab-ci

jobs:
  build-and-push:
    name: Build and push to ECR
    runs-on: [self-hosted, int-gpu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Amazon ECR
        id: login-ecr
        # AWS creds are picked from OS env by the amazon-ecr-login action
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG:0:7}"
          docker build -f .github/workflows/Dockerfile.hello -t "$IMAGE" .
          docker push "$IMAGE"
          echo "Pushed: $IMAGE" >> "$GITHUB_STEP_SUMMARY"
