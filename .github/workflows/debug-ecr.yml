name: Debug ECR

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: isaaclab-ci

jobs:
  build-and-push:
    name: Build and push to ECR
    runs-on: [self-hosted, gpu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push
        env:
          TAG: ${{ github.sha }}
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG:0:7}"

          # login to ECR
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin "${REGISTRY}"

          docker build -f .github/workflows/Dockerfile.hello -t "$IMAGE" .
          docker push "$IMAGE"
          echo "Pushed: $IMAGE" >> "$GITHUB_STEP_SUMMARY"
