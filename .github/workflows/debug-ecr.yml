name: Debug ECR

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: isaaclab-ci

jobs:
  build-and-push:
    name: Build and push to ECR
    runs-on: [self-hosted, gpu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push
        env:
          TAG: ${{ github.sha }}
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

          # login to ECR using a temp config dir to bypass broken credential store
          DOCKER_CONFIG=$(mktemp -d)
          echo '{"credsStore":""}' > "${DOCKER_CONFIG}/config.json"
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker --config "${DOCKER_CONFIG}" login --username AWS --password-stdin "${REGISTRY}"

          if docker --config "${DOCKER_CONFIG}" pull "${IMAGE}" 2>/dev/null; then
            echo "Image already exists in ECR, skipping build." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            docker --config "${DOCKER_CONFIG}" build --progress=plain -f .github/workflows/Dockerfile.hello -t "$IMAGE" .
            docker --config "${DOCKER_CONFIG}" push "$IMAGE"
            echo "Pushed: $IMAGE" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG}" >> "$GITHUB_ENV"

      - name: Run toy task in container
        run: |
          docker --config "${DOCKER_CONFIG}" run --rm "${IMAGE}" \
            sh -c 'echo "Hello from inside the container!" && uname -a && python3 --version'
