name: Docker + Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'source/**'
      - 'docker/**'
      - 'tools/**'
      - 'apps/**'
      - '.github/workflows/build.yaml'
      - '.github/actions/**'
    branches:
      - main
      - develop
      - 'release/**'

# Concurrency control to prevent parallel runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: read

env:
  NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
  # On merge to main defaults will point to "nvcr.io/nvidia/isaac-sim:6.0.0"
  ISAACSIM_BASE_IMAGE: 'nvcr.io/nvidian/isaac-sim' # ${{ vars.ISAACSIM_BASE_IMAGE || 'nvcr.io/nvidia/isaac-sim' }}
  ISAACSIM_BASE_VERSION: 'latest-release-6-0' # ${{ vars.ISAACSIM_BASE_VERSION || '6.0.0' }}
  DOCKER_IMAGE_TAG: isaac-lab-dev:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}-${{ github.sha }}

jobs:
  build:
    name: Build base Docker image
    runs-on: [self-hosted, gpu]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: true

    - name: Build and push to ECR
      uses: ./.github/actions/ecr-build-push-pull
      with:
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        dockerfile-path: docker/Dockerfile.base
        cache-tag: cache-base

    # ECR images must be pruned with a lifecycle policy.
    - name: Clean up stale Docker images
      if: always()
      run: docker image prune -f --filter "until=24h" || true

  build-curobo:
    name: Build cuRobo Docker image
    runs-on: [self-hosted, gpu]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: true

    - name: Build and push to ECR
      uses: ./.github/actions/ecr-build-push-pull
      with:
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}-curobo
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        dockerfile-path: docker/Dockerfile.curobo
        cache-tag: cache-curobo

    # ECR images must be pruned with a lifecycle policy.
    - name: Clean up stale Docker images
      if: always()
      run: docker image prune -f --filter "until=24h" || true


  test-isaaclab-tasks:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180
    continue-on-error: true
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: true

    - name: Pull image from ECR
      uses: ./.github/actions/ecr-build-push-pull
      with:
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        dockerfile-path: docker/Dockerfile.base
        cache-tag: cache-base

    - name: Run IsaacLab Tasks Tests
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "${{ github.job }}-report.xml"
        container-name: "isaac-lab-tasks-test-${{ github.run_id }}-${{ github.run_attempt }}"
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        pytest-options: ""
        filter-pattern: "isaaclab_tasks"
        include-files: "test_multi_agent_environments.py,test_pickplace_stack_environments.py,test_environments.py,test_environments_newton.py,test_factory_environments.py,test_environments_training.py,test_cartpole_showcase_environments.py,test_teleop_environments.py"

    - name: Upload IsaacLab Tasks Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: isaaclab-tasks-test-results
        path: reports/${{ github.job }}-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/${{ github.job }}-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/${{ github.job }}-report.xml || grep -q 'errors="[1-9]' reports/${{ github.job }}-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

    # ECR images must be pruned with a lifecycle policy.
    - name: Clean up stale Docker images
      if: always()
      run: docker image prune -f --filter "until=24h" || true

  test-isaaclab-tasks-2:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180
    continue-on-error: true
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: true

    - name: Pull image from ECR
      uses: ./.github/actions/ecr-build-push-pull
      with:
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        dockerfile-path: docker/Dockerfile.base
        cache-tag: cache-base

    - name: Run IsaacLab Tasks Tests 2
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "${{ github.job }}-report.xml"
        container-name: "isaac-lab-tasks-2-test-${{ github.run_id }}-${{ github.run_attempt }}"
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        pytest-options: ""
        filter-pattern: "isaaclab_tasks"
        include-files: "test_teleop_environments_with_stage_in_memory.py,test_lift_teddy_bear.py,test_environment_determinism.py,test_hydra.py,test_env_cfg_no_forbidden_imports.py,test_rl_device_separation.py,test_cartpole_showcase_environments_with_stage_in_memory.py,test_environments_with_stage_in_memory.py,test_shadow_hand_vision_presets.py"

    - name: Upload IsaacLab Tasks 2 Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: isaaclab-tasks-2-test-results
        path: reports/${{ github.job }}-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/${{ github.job }}-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/${{ github.job }}-report.xml || grep -q 'errors="[1-9]' reports/${{ github.job }}-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

    # ECR images must be pruned with a lifecycle policy.
    - name: Clean up stale Docker images
      if: always()
      run: docker image prune -f --filter "until=24h" || true

  test-general:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: true

    - name: Pull image from ECR
      uses: ./.github/actions/ecr-build-push-pull
      with:
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        dockerfile-path: docker/Dockerfile.base
        cache-tag: cache-base

    - name: Run General Tests
      id: run-general-tests
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "${{ github.job }}-report.xml"
        container-name: "isaac-lab-general-test-${{ github.run_id }}-${{ github.run_attempt }}"
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}
        pytest-options: ""
        filter-pattern: "not isaaclab_tasks"

    - name: Upload General Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: general-test-results
        path: reports/${{ github.job }}-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/${{ github.job }}-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/${{ github.job }}-report.xml || grep -q 'errors="[1-9]' reports/${{ github.job }}-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

    # ECR images must be pruned with a lifecycle policy.
    - name: Clean up stale Docker images
      if: always()
      run: docker image prune -f --filter "until=24h" || true

  test-curobo:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 120
    continue-on-error: true
    needs: build-curobo

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: true

    - name: Pull cuRobo image from ECR
      uses: ./.github/actions/ecr-build-push-pull
      with:
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}-curobo
        isaacsim-base-image: ${{ env.ISAACSIM_BASE_IMAGE }}
        isaacsim-version: ${{ env.ISAACSIM_BASE_VERSION }}
        dockerfile-path: docker/Dockerfile.curobo
        cache-tag: cache-curobo

    - name: Run cuRobo and SkillGen Tests
      uses: ./.github/actions/run-tests
      with:
        test-path: "tools"
        result-file: "${{ github.job }}-report.xml"
        container-name: "isaac-lab-curobo-test-${{ github.run_id }}-${{ github.run_attempt }}"
        image-tag: ${{ env.DOCKER_IMAGE_TAG }}-curobo
        pytest-options: ""
        filter-pattern: ""
        curobo-only: "true"

    - name: Upload cuRobo Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: curobo-test-results
        path: reports/${{ github.job }}-report.xml
        retention-days: 1
        compression-level: 9

    - name: Check Test Results for Fork PRs
      if: github.event.pull_request.head.repo.full_name != github.repository
      run: |
        if [ -f "reports/${{ github.job }}-report.xml" ]; then
          # Check if the test results contain any failures
          if grep -q 'failures="[1-9]' reports/${{ github.job }}-report.xml || grep -q 'errors="[1-9]' reports/${{ github.job }}-report.xml; then
            echo "Tests failed for PR from fork. The test report is in the logs. Failing the job."
            exit 1
          fi
        else
          echo "No test results file found. This might indicate test execution failed."
          exit 1
        fi

    # ECR images must be pruned with a lifecycle policy.
    - name: Clean up stale Docker images
      if: always()
      run: docker image prune -f --filter "until=24h" || true

  combine-results:
    needs: [build, build-curobo, test-isaaclab-tasks, test-isaaclab-tasks-2, test-general, test-curobo]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: false
        sparse-checkout: .github/actions
        sparse-checkout-cone-mode: true

    - name: Create Reports Directory
      run: |
        mkdir -pv reports

    - name: Download Test Results
      uses: actions/download-artifact@v4
      with:
        name: isaaclab-tasks-test-results
        path: reports/
      continue-on-error: true

    - name: Download IsaacLab Tasks 2 Test Results
      uses: actions/download-artifact@v4
      with:
        name: isaaclab-tasks-2-test-results
        path: reports/
      continue-on-error: true

    - name: Download General Test Results
      if: always()
      uses: actions/download-artifact@v4
      with:
        name: general-test-results
        path: reports/
      continue-on-error: true

    - name: Download cuRobo Test Results
      uses: actions/download-artifact@v4
      with:
        name: curobo-test-results
        path: reports/
      continue-on-error: true

    - name: Combine All Test Results
      if: always()
      uses: ./.github/actions/combine-results
      with:
        tests-dir: "reports"
        output-file: "reports/combined-results.xml"

    - name: Upload Combined Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pr-${{ github.event.pull_request.number }}-combined-test-results
        path: reports/combined-results.xml
        retention-days: 7
        compression-level: 9

    - name: Comment on Test Results
      id: test-reporter
      if: github.event.pull_request.head.repo.full_name == github.repository
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: "reports/combined-results.xml"
        check_name: "Tests Summary"
        comment_mode: changes
        comment_title: "Test Results Summary"
        report_individual_runs: false
        deduplicate_classes_by_file_name: true
        compare_to_earlier_commit: true
        fail_on: errors
        action_fail_on_inconclusive: true

    - name: Report Test Results
      if: github.event.pull_request.head.repo.full_name == github.repository
      uses: dorny/test-reporter@v1
      with:
        name: IsaacLab Build and Test Results
        path: reports/combined-results.xml
        reporter: java-junit
        fail-on-error: true
        only-summary: false
        max-annotations: '50'
        report-title: "IsaacLab Test Results - ${{ github.workflow }}"
